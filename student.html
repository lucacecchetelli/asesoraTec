<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student | AsesoraTec</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="page-container">
        <header class="header" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="login.html" class="header-btn"><h2>AsesoraTec</h2></a>
            
            <div style="text-align: right; color: white;">
                <strong id="headerMatricula" style="font-size: 1.1rem;">Cargando...</strong><br>
                <span style="font-size: 0.85rem; color: #a0aec0;">
                    Estatus: <span id="headerEstatus" style="color: #3498db;">Cargando...</span>
                </span>
            </div>
        </header>
    
        <main class="main">
            <div class="login-box" style="max-width: 1000px;">
    
                <div class="filters-bar" style="margin-bottom: 20px;">
                    <button class="nav-tab active" onclick="showTable()">Asesorías Disponibles</button>
                    <button class="nav-tab" onclick="showProfile()">Mi Perfil</button>
                </div>
    
                <div id="tableView" class="view active-view" style="width: 100%;">
                    <div class="filters-bar" style="gap: 15px; margin-bottom: 20px; justify-content: flex-start;">
                        <select id="classFilter" class="options-bar" style="max-width: 250px;" onchange="renderAll()">
                            <option value="ALL">Todas mis materias</option>
                        </select>
                        <select id="dayFilter" class="options-bar" style="max-width: 150px;" onchange="renderAll()">
                            <option value="ALL">Todos los días</option>
                            <option value="Lunes">Lunes</option>
                            <option value="Martes">Martes</option>
                            <option value="Miércoles">Miércoles</option>
                            <option value="Jueves">Jueves</option>
                            <option value="Viernes">Viernes</option>
                        </select>
                    </div>
    
                    <table class="student-table" style="width: 100%; border-collapse: collapse; color: white;">
                        <thead>
                            <tr>
                                <th style="text-align: left; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);">Materia</th>
                                <th style="text-align: left; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);">Día</th>
                                <th style="text-align: left; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);">Horario</th>
                                <th style="text-align: left; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);">Modalidad</th>
                                <th style="text-align: center; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);">Cupo</th>
                                <th style="text-align: center; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="availableBody"></tbody>
                    </table>
                </div>
    
                <div id="profileView" class="view" style="width: 100%;">
                    <div class="profile-card" style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                        <h3 style="color: white; margin-top: 0;">Datos del Estudiante</h3>
                        <p style="color: #a0aec0; margin: 5px 0;"><strong>Matrícula:</strong> <span id="profileMatricula" style="color: white;">...</span></p>
                        <p style="color: #a0aec0; margin: 5px 0;"><strong>Programa:</strong> <span id="profileProgram" style="color: white;">...</span></p>
                        <p style="color: #a0aec0; margin: 5px 0;"><strong>Estatus:</strong> <span id="profileStatus" style="color: #3498db;">...</span></p>
                    </div>
    
                    <div class="profile-card" style="margin-bottom: 30px;">
                        <h4 style="color: white; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 15px;">Mis Asesorías (Próximas)</h4>
                        <table class="student-table" style="width: 100%; border-collapse: collapse; color: white;">
                            <thead>
                                <tr style="text-align: left; font-size: 0.85rem; color: #a0aec0; border-bottom: 1px solid rgba(255,255,255,0.1);">
                                    <th style="width: 30%; padding: 10px;">Materia</th>
                                    <th style="width: 15%; padding: 10px;">Día</th>
                                    <th style="width: 20%; padding: 10px;">Horario</th>
                                    <th style="width: 15%; padding: 10px;">Lugar</th>
                                    <th style="width: 20%; padding: 10px; text-align: right;">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="registeredBody"></tbody>
                        </table>
                    </div>

                    <div class="profile-card">
                        <h4 style="color: white; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 15px;">Historial de Asistencias</h4>
                        <table class="student-table" style="width: 100%; border-collapse: collapse; color: white;">
                            <thead>
                                <tr style="text-align: left; font-size: 0.85rem; color: #a0aec0; border-bottom: 1px solid rgba(255,255,255,0.1);">
                                    <th style="width: 30%; padding: 10px;">Materia</th>
                                    <th style="width: 15%; padding: 10px;">Día</th>
                                    <th style="width: 20%; padding: 10px;">Horario</th>
                                    <th style="width: 15%; padding: 10px;">Lugar</th>
                                    <th style="width: 20%; padding: 10px; text-align: right;">Estado</th>
                                </tr>
                            </thead>
                            <tbody id="historyBody"></tbody>
                        </table>
                    </div>
                </div>
    
            </div>
        </main>
    
        <script>
            let currentStudentMatricula = "";
            let studentProfile = null;
            let studentClaves = [];
            let allSystemAdvisories = [];

            function getAdvisoryTargetDate(dayString, startHour, startMinutes) {
                const exactDaysMap = { "Lunes": 1, "Martes": 2, "Miércoles": 3, "Jueves": 4, "Viernes": 5 };
                const now = new Date();
                const currentDayOfWeek = now.getDay() || 7;

                const monday = new Date(now);
                monday.setDate(now.getDate() - currentDayOfWeek + 1);
                monday.setHours(0, 0, 0, 0);

                const targetDate = new Date(monday);
                targetDate.setDate(monday.getDate() + (exactDaysMap[dayString] - 1));
                targetDate.setHours(startHour, startMinutes, 0, 0);

                if (targetDate < now) {
                    targetDate.setDate(targetDate.getDate() + 7);
                }

                return targetDate;
            }

            function getMergeKey(a) {
                return [a.clave, a.day, a.startHour, a.startMinutes, a.place, a.modality].join('|');
            }

            function groupAdvisoriesForMerge(advisories) {
                const groups = [];
                const groupMap = new Map();
                advisories.forEach(a => {
                    const key = getMergeKey(a);
                    if (!groupMap.has(key)) {
                        const g = { key, items: [] };
                        groupMap.set(key, g);
                        groups.push(g);
                    }
                    groupMap.get(key).items.push(a);
                });
                return groups;
            }

            async function initializeStudentPage() {
                try {
                    const response = await fetch("/api/auth/me");
                    if (!response.ok) throw new Error("Not logged in");
                    const user = await response.json();
                    currentStudentMatricula = user.id || user.matricula;

                    const profileRes = await fetch(`/api/student/${currentStudentMatricula}`);
                    if (!profileRes.ok) throw new Error("Profile not found in DB");
                    studentProfile = await profileRes.json();

                    document.getElementById('headerMatricula').textContent = `${studentProfile.MATRICULA} - ${studentProfile.PROGRAMA}`;
                    document.getElementById('headerEstatus').textContent = studentProfile["Estatus acad"] || "Regular";

                    document.getElementById('profileMatricula').textContent = studentProfile.MATRICULA;
                    document.getElementById('profileProgram').textContent = studentProfile.PROGRAMA;
                    document.getElementById('profileStatus').textContent = studentProfile["Estatus acad"] || "Regular";

                    const filterSelect = document.getElementById("classFilter");
                    studentProfile.classes.forEach(c => {
                        const classId = c.clave || c.materia;
                        studentClaves.push(classId);
                        const option = document.createElement("option");
                        option.value = classId;
                        if (c.clave && c.materia && c.clave !== c.materia) {
                            option.textContent = `${c.clave} - ${c.materia}`;
                        } else {
                            option.textContent = c.nombre || c.materia;
                        }
                        filterSelect.appendChild(option);
                    });

                    loadAllAdvisories();
                    renderAll();

                } catch (err) {
                    console.error("Initialization failed:", err);
                    if (err.message === "Not logged in") window.location.href = "login.html";
                }
            }

            function loadAllAdvisories() {
                allSystemAdvisories = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key.startsWith('teacherAdvisories_')) {
                        const teacherId = key.split('_')[1];
                        const advisories = JSON.parse(localStorage.getItem(key)) || [];
                        advisories.forEach(a => a.teacherId = teacherId);
                        allSystemAdvisories = allSystemAdvisories.concat(advisories);
                    }
                }
            }

            function showTable() {
                document.getElementById("tableView").classList.add("active-view");
                document.getElementById("profileView").classList.remove("active-view");
                document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
                document.querySelectorAll(".nav-tab")[0].classList.add("active");
            }

            function showProfile() {
                document.getElementById("profileView").classList.add("active-view");
                document.getElementById("tableView").classList.remove("active-view");
                document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
                document.querySelectorAll(".nav-tab")[1].classList.add("active");
            }

            function renderAll() {
                const registeredBody = document.getElementById("registeredBody");
                const historyBody = document.getElementById("historyBody");

                registeredBody.innerHTML = "";
                historyBody.innerHTML = "";

                const classFilter = document.getElementById("classFilter").value;
                const dayFilter = document.getElementById("dayFilter").value;

                let relevantAdvisories = allSystemAdvisories.filter(a => studentClaves.includes(a.clave));

                let available = [];
                let registered = [];

                relevantAdvisories.forEach(a => {
                    const enrolledList = a.enrolledStudents || [];
                    const isEnrolled = enrolledList.includes(currentStudentMatricula);
                    const isClosed = a.sessionClosed || false;

                    if (isEnrolled && !isClosed) {
                        registered.push(a);
                    } else if (!isClosed && a.enrolled < a.capacity) {
                        available.push(a);
                    }
                });

                let history = [];
                allSystemAdvisories.forEach(a => {
                    (a.attendanceHistory || []).forEach(record => {
                        if (record.matricula === currentStudentMatricula) {
                            history.push(record);
                        }
                    });
                });
                history.sort((x, y) => new Date(y.historyDate) - new Date(x.historyDate));

                if (classFilter !== "ALL") available = available.filter(a => a.clave === classFilter);
                if (dayFilter !== "ALL") available = available.filter(a => a.day === dayFilter);

                renderAvailableMerged(available);

                if (registered.length === 0) {
                    registeredBody.innerHTML = `<tr><td style="text-align: center; color: #a0aec0; padding: 20px;">No tienes asesorías próximas.</td></tr>`;
                } else {
                    registered.forEach(a => registeredBody.appendChild(createRowHTML(a, 'registered')));
                }

                if (history.length === 0) {
                    historyBody.innerHTML = `<tr><td style="text-align: center; color: #a0aec0; padding: 20px;">No hay historial de asistencias.</td></tr>`;
                } else {
                    history.forEach(record => historyBody.appendChild(createRowHTML(record, 'history')));
                }
            }

            function renderAvailableMerged(available) {
                const availableBody = document.getElementById("availableBody");
                availableBody.innerHTML = "";

                if (available.length === 0) {
                    availableBody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: #a0aec0; padding: 20px;">No hay asesorías disponibles.</td></tr>`;
                    return;
                }

                const groups = groupAdvisoriesForMerge(available);

                groups.forEach(g => {
                    const items = g.items;
                    const first = items[0];
                    const rowCount = items.length;

                    const format = (h, m) => `${h.toString().padStart(2,'0')}:${m.toString().padStart(2, '0')}`;
                    const timeStr = `${format(first.startHour, first.startMinutes)} - ${format(first.startHour + 1, first.startMinutes)}`;

                    const displayName = (first.clave && first.className && first.clave !== first.className)
                        ? `${first.clave} - ${first.className}`
                        : (first.className || first.clave);

                    const targetDate = getAdvisoryTargetDate(first.day, first.startHour, first.startMinutes);
                    const dateDisplay = `${first.day} ${targetDate.getDate()}/${targetDate.getMonth() + 1}`;

                    items.forEach((a, idx) => {
                        const row = document.createElement("tr");
                        let cells = "";

                        if (idx === 0) {
                            cells += `
                                <td rowspan="${rowCount}" style="padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                                    <strong style="display:block;">${displayName}</strong>
                                    <small style="color: #a0aec0;">Prof: ${first.profesor || 'N/A'}</small>
                                </td>
                                <td rowspan="${rowCount}" style="padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05);">${dateDisplay}</td>
                                <td rowspan="${rowCount}" style="padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05);">${timeStr}</td>
                                <td rowspan="${rowCount}" style="padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                                    ${first.modality || 'Presencial'}<br>
                                    <small style="color: #a0aec0;">${first.place || ''}</small>
                                </td>
                            `;
                        }

                        cells += `
                            <td style="padding: 12px 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: bold; color: #3498db;">
                                Gpo ${a.grupo || 'N/A'}: ${a.enrolled}/${a.capacity}
                            </td>
                            <td style="padding: 12px 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05);">
                                <button class="join-btn" style="background-color: #3498db;" onclick="registerForAdvisory('${a.id}', '${a.teacherId}')">Inscribirse</button>
                            </td>
                        `;

                        row.innerHTML = cells;
                        availableBody.appendChild(row);
                    });
                });
            }

            function createRowHTML(a, type) {
                const row = document.createElement("tr");
                const format = (h, m) => `${h.toString().padStart(2,'0')}:${m.toString().padStart(2, '0')}`;
                const timeStr = `${format(a.startHour, a.startMinutes)} - ${format(a.startHour + 1, a.startMinutes)}`;

                let dayDisplay;
                if (a.historyDate) {
                    const d = new Date(a.historyDate);
                    dayDisplay = `${a.day} ${d.getDate()}/${d.getMonth() + 1}`;
                } else {
                    const targetDate = getAdvisoryTargetDate(a.day, a.startHour, a.startMinutes);
                    dayDisplay = `${a.day} ${targetDate.getDate()}/${targetDate.getMonth() + 1}`;
                }

                const displayName = (a.clave && a.className && a.clave !== a.className)
                    ? `${a.clave} - ${a.className}`
                    : (a.className || a.clave);
                    
                let actionHtml = "";
                let rowData = `
                    <td style="padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                        <strong style="display:block;">${displayName}</strong>
                        <small style="color: #a0aec0;">Prof: ${a.profesor || 'N/A'}</small>
                    </td>
                    <td style="padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05);">${dayDisplay}</td>
                    <td style="padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05);">${timeStr}</td>
                    <td style="padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05);">${a.place}</td>
                `;

                if (type === 'registered') {
                    let buttons = `<button class="join-btn" style="background-color: #e74c3c;" onclick="cancelRegistration('${a.id}', '${a.teacherId}')">Cancelar</button>`;
                    if (a.modality === 'En línea' && a.meetingLink) {
                        buttons = `<a href="${a.meetingLink}" target="_blank" class="join-btn" style="background-color: #2ecc71; text-decoration: none; display: inline-block; margin-right: 5px;">Link</a>` + buttons;
                    }
                    rowData += `<td style="padding: 12px 10px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.05);">${buttons}</td>`;
                }
                else if (type === 'history') {
                    actionHtml = `<span style="color: #2ecc71; font-weight: bold; font-size: 0.9rem;">✓ Asistió</span>`;
                    rowData += `<td style="padding: 12px 10px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.05);">${actionHtml}</td>`;
                }

                row.innerHTML = rowData;
                return row;
            }

            function registerForAdvisory(advisoryId, teacherId) {
                if (!confirm("¿Deseas registrarte a esta asesoría?")) return;

                const storageKey = `teacherAdvisories_${teacherId}`;
                let teacherData = JSON.parse(localStorage.getItem(storageKey));
                if (!teacherData) return alert("Error de base de datos.");

                const index = teacherData.findIndex(a => a.id.toString() === advisoryId.toString());
                if (index === -1) return;

                if (!teacherData[index].enrolledStudents) teacherData[index].enrolledStudents = [];
                teacherData[index].enrolledStudents.push(currentStudentMatricula);
                teacherData[index].enrolled++;

                localStorage.setItem(storageKey, JSON.stringify(teacherData));
                alert("¡Inscrito con éxito!");
                
                loadAllAdvisories();
                renderAll();
                showProfile();
            }

            function cancelRegistration(advisoryId, teacherId) {
                if (!confirm("¿Seguro que deseas cancelar tu inscripción?")) return;

                const storageKey = `teacherAdvisories_${teacherId}`;
                let teacherData = JSON.parse(localStorage.getItem(storageKey));
                if (!teacherData) return;

                const index = teacherData.findIndex(a => a.id.toString() === advisoryId.toString());
                if (index === -1) return;

                teacherData[index].enrolledStudents = teacherData[index].enrolledStudents.filter(m => m !== currentStudentMatricula);
                teacherData[index].enrolled--;

                localStorage.setItem(storageKey, JSON.stringify(teacherData));
                
                loadAllAdvisories();
                renderAll();
            }

            initializeStudentPage();
        </script>
    </div>
</body>
</html>
